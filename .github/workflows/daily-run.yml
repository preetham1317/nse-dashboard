name: Daily data refresh

on:
  schedule:
    # 10:15 UTC = 15:45 IST, weekdays — 15 min after the 15:30 NSE close, giving Angel
    # time to finalize the day's daily candle (starting sooner risks a not-yet-final last
    # candle being labelled as today). The evening brief is the last pipeline step, sent
    # once all output is written, so on a normal warm run it lands ~16:00 IST. It is
    # intentionally coupled to the pipeline so it never reads torn or stale data; on the
    # occasional slow run it drifts later but always reflects that day's close.
    - cron: "15 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fundamentals change quarterly, so persist the yfinance cache between runs. This
      # keeps most daily runs off yfinance entirely (avoiding the rate-limiting that made
      # fundamentals unavailable) and only re-fetches once the ~7-day TTL lapses.
      - name: Restore fundamentals cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: yfcache-${{ github.run_id }}
          restore-keys: |
            yfcache-

      - name: Run pipeline
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_ID: ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: python -m src.pipeline

      # Coupled to the pipeline on purpose: runs only after every stock/market/portfolio
      # file is fully written, so the evening wrap is always internally consistent and
      # reflects the close that just finished processing (~16:00 IST on a warm run).
      - name: Send evening Telegram briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.telegram_notify --mode evening

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output
          git diff --cached --quiet || git commit -m "chore: refresh daily data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/dashboard _site/data
          cp -r dashboard/. _site/dashboard/
          cp -r data/output _site/data/output
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0; url=dashboard/index.html">
          <a href="dashboard/index.html">Open dashboard</a>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
