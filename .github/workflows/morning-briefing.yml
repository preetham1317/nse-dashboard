name: Morning briefing

on:
  schedule:
    # 03:30 UTC = 09:00 IST, weekdays. India opens 09:15 IST, so this lands just before
    # the bell with an overnight read of global markets.
    - cron: "30 3 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # yfinance (+pandas) is needed for the live index refresh; requests/dotenv for the send.
      - name: Install dependencies
        run: pip install requests python-dotenv yfinance pandas

      # Refresh global + India index levels live, as of ~09:00 IST, so the morning brief
      # reflects the overnight US/Asia session (not yesterday's data). No Angel/secrets
      # needed — yfinance only. Watchlist leaders come from the last published pipeline run.
      - name: Refresh index levels (global + India)
        run: python -m src.fetch_market --indices-only

      - name: Send morning Telegram briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.telegram_notify --mode morning
